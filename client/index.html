        animation: genov-bounce 1.1s ease-in-out infinite both;
      }
      .genov__spinner span:nth-child(2) { animation-delay: 0.16s; }
      .genov__spinner span:nth-child(3) { animation-delay: 0.32s; }
      @keyframes genov-bounce {
        0%, 80%, 100% { transform: scale(0.5); opacity: 0.45; }
        40% { transform: scale(1); opacity: 1; }
      }
      .genov__title {
        margin: 0 0 0.4rem;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text, #f0f6fc);
      }
      .genov__phase {
        margin: 0 0 1.1rem;
        font-size: 0.92rem;
        color: var(--gold, #e3b341);
        min-height: 1.2em;
        transition: opacity 0.2s;
      }
      .genov__steps {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin: 0 auto 1.1rem;
        max-width: 22rem;
      }
      .genov__bar {
        flex: 1;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      .genov__bar i {
        display: block;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #46d39a, #58a6ff);
        transition: width 0.5s ease;
      }
      .genov__count {
        font-size: 0.75rem;
        color: var(--text-faint, #8b949e);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .genov__hint {
        margin: 0;
        font-size: 0.75rem;
        line-height: 1.5;
        color: var(--text-faint, #8b949e);
      }
      @media (prefers-reduced-motion: reduce) {
        .genov, .genov__spinner span, .genov__bar i { animation: none; transition: none; }
      }

      /* ---- First-run setup screen --------------------------------------- */
      .setup {
        position: fixed;
        inset: 0;
        z-index: 9100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        overflow: auto;
        background: radial-gradient(120% 120% at 50% 25%, rgba(26, 34, 28, 0.9), rgba(8, 11, 15, 0.97));
        backdrop-filter: blur(4px);
        animation: genov-fade 0.4s ease both;
      }
      .setup[hidden] { display: none; }
      .setup__card {
        width: min(94vw, 34rem);
        padding: 1.8rem 1.8rem 1.6rem;
        background: rgba(22, 27, 34, 0.96);
        border: 1px solid var(--border-soft);
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
      }
      .setup__title { margin: 0 0 0.3rem; font-size: 1.3rem; font-weight: 800; color: var(--text); }
      .setup__subtitle { margin: 0 0 1.2rem; font-size: 0.86rem; line-height: 1.5; color: var(--text-faint); }
      .setup__label {
        display: block;
        margin: 1.1rem 0 0.45rem;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-faint);
      }
      /* Segmented controls (mode + size) */
      .setup__seg { display: flex; gap: 0.4rem; }
      .setup__modes { margin-bottom: 0.4rem; }
      .setup__segbtn {
        flex: 1;
        padding: 0.55rem 0.5rem;
        border-radius: 10px;
        border: 1px solid var(--border-soft);
        background: var(--card);
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .setup__segbtn:hover:not(:disabled) { border-color: var(--ok); }
      .setup__segbtn.is-active {
        background: rgba(70, 211, 154, 0.16);
        border-color: var(--ok);
        color: #c8f6e2;
      }
      .setup__segbtn:disabled { opacity: 0.4; cursor: not-allowed; }
      /* Style chips */
      .setup__chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
      .setup__chip {
        padding: 0.4rem 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        background: var(--card);
        color: var(--text);
        font-size: 0.78rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .setup__chip:hover { border-color: var(--gold); }
      .setup__chip.is-active { background: rgba(120, 90, 180, 0.22); border-color: #a98fd0; color: #e7defb; }
      .setup__style {
        width: 100%;
        margin-top: 0.6rem;
        padding: 0.6rem 0.7rem;
        border-radius: 10px;
        border: 1px solid var(--border-soft);
        background: rgba(13, 17, 23, 0.7);
        color: var(--text);
        font-size: 0.86rem;
        box-sizing: border-box;
      }
      .setup__style:focus { outline: none; border-color: var(--ok); }
      /* Colour swatch */
      .setup__swatch {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.7rem;
        min-height: 1.5rem;
      }
      .setup__dot {
        width: 1.1rem;
        height: 1.1rem;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      }
      .setup__swatchlabel { font-size: 0.78rem; color: var(--gold); font-style: italic; }
      /* Villager slider row */
      .setup__row { display: flex; align-items: center; gap: 0.7rem; }
      .setup__row .setup__label { margin: 1.1rem 0 0.45rem; flex: 0 0 auto; }
      .setup__range { flex: 1; accent-color: var(--ok); }
      .setup__rowval {
        flex: 0 0 1.6rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--text);
      }
      /* Go button */
      .setup__go {
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.8rem;
        border-radius: 12px;
        border: none;
        background: linear-gradient(90deg, #46d39a, #58a6ff);
        color: #08240f;
        font-size: 0.95rem;
        font-weight: 800;
        cursor: pointer;
        transition: filter 0.15s, opacity 0.15s;
      }
      .setup__go:hover:not(:disabled) { filter: brightness(1.08); }
      .setup__go:disabled { opacity: 0.6; cursor: default; }
      .setup__staticnote { margin: 0.4rem 0 0; font-size: 0.84rem; line-height: 1.5; color: var(--text-faint); }
      /* Settings danger zone (New Village) */
      .settings__group--danger { border-top: 1px solid rgba(248, 81, 73, 0.25); }
      .settings__danger {
        padding: 0.5rem 0.9rem;
        border-radius: 9px;
        border: 1px solid rgba(248, 81, 73, 0.5);
        background: rgba(248, 81, 73, 0.12);
        color: #ffb3ad;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
      }
      .settings__danger:hover { background: rgba(248, 81, 73, 0.2); }
      .settings__confirm { margin-top: 0.6rem; font-size: 0.82rem; color: var(--text); }
      .settings__confirmbtns { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
      .settings__cancel {
        padding: 0.5rem 0.9rem;
        border-radius: 9px;
        border: 1px solid var(--border-soft);
        background: var(--card);
        color: var(--text);
        font-size: 0.82rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>

    <!-- Full-screen first-run SETUP screen, shown when the backend has no world yet.
         Built + toggled by SetupScreen. -->
    <div id="setup-screen" class="setup" hidden></div>

    <!-- Full-screen loading overlay, shown only while the backend is generating a
         village with the LLM (it takes minutes). Populated + toggled by GenerationOverlay. -->
    <div id="gen-overlay" class="genov" hidden role="status" aria-live="polite">
      <div class="genov__card">
        <div class="genov__spinner" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <h2 class="genov__title">Summoning your village</h2>
        <p id="gen-overlay-phase" class="genov__phase">Waking the world-builder…</p>
        <div class="genov__steps">
          <div id="gen-overlay-bar" class="genov__bar"><i style="width:0%"></i></div>
          <span id="gen-overlay-count" class="genov__count"></span>
        </div>
        <p class="genov__hint">The village is being dreamed up just for you. This can take a minute or two.</p>
      </div>
    </div>

    <header class="topbar">
      <span class="topbar__brand">
        <span class="topbar__logo"></span>
        simVillage<span id="app-version" class="topbar__version"></span>
        <span class="topbar__sub">🛖 a living village</span>
      </span>
      <span class="topbar__spacer"></span>
      <div id="clock" hidden></div>
      <button id="reset-layout" class="topbar__btn" title="Reset all windows to their default positions">⟲ Reset layout</button>
      <span id="status" class="topbar__status topbar__status--off">connecting…</span>
    </header>

    <!-- The desktop (windows) and dock are created by WindowManager at runtime. -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
