<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simVillage — a living village</title>
    <!-- First-paint base styles only; the full stylesheet (Tailwind + the dusk
         design system) is imported from the JS entry as client/src/index.css. -->
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #090c14; color: #e2e8f6; font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
      #viewport { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; background: radial-gradient(120% 120% at 50% 0%, #121a2b 0%, #0f131d 60%, #070a11 100%); image-rendering: pixelated; cursor: grab; touch-action: none; z-index: 0; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>

    <!-- Full-screen first-run SETUP screen, shown when the backend has no world yet.
         Built + toggled by SetupScreen. -->
    <div id="setup-screen" class="setup" hidden></div>

    <!-- Full-screen loading overlay, shown only while the backend is generating a
         village with the LLM (it takes minutes). Populated + toggled by GenerationOverlay. -->
    <div id="gen-overlay" class="genov" hidden role="status" aria-live="polite">
      <div class="genov__card">
        <div class="genov__spinner" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <h2 class="genov__title">Summoning your village</h2>
        <p id="gen-overlay-phase" class="genov__phase">Waking the world-builder…</p>
        <div class="genov__steps">
          <div id="gen-overlay-bar" class="genov__bar"><i style="width:0%"></i></div>
          <span id="gen-overlay-count" class="genov__count"></span>
        </div>
        <p class="genov__hint">The village is being dreamed up just for you. This can take a minute or two.</p>
      </div>
    </div>

    <!-- The topbar is rendered by React (client/src/react/components/Topbar.tsx).
         The desktop (windows) and dock are created by WindowManager at runtime. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
