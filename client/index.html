<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simVillage — a living village</title>
    <style>
      /* ===================================================================
         DESIGN TOKENS — the single source of the UI's look. A warm "village at
         dusk" dark theme rendered as a tiny desktop OS: floating glass windows
         over a living map, a top app bar, and a bottom dock.
         =================================================================== */
      :root {
        color-scheme: dark;

        /* Base + surfaces */
        --bg: #090c14;
        --surface-2: #0f131d; /* canvas / code backgrounds */
        --glass: rgba(18, 23, 36, 0.82); /* windows, bars, dock */
        --glass-strong: rgba(15, 19, 30, 0.94);
        --card: rgba(34, 42, 64, 0.5); /* raised cards inside panels */
        --card-hover: rgba(48, 59, 90, 0.7);

        /* Lines */
        --border: #2a3450;
        --border-soft: #1c2438;
        --border-active: #466099;

        /* Text */
        --text: #e2e8f6;
        --text-muted: #99a6c4;
        --text-faint: #6a7591;

        /* Accents */
        --accent: #6ea8ff;
        --accent-strong: #4f8cff;
        --ok: #46d39a;
        --warn: #ffb454;
        --danger: #ff6b6b;
        --violet: #b48cff;
        --gold: #ffd479;
        --teal: #5fe0c0;

        /* Window system */
        --radius: 12px;
        --radius-sm: 8px;
        --bar-h: 38px;
        --topbar-h: 46px;
        --shadow: 0 10px 34px rgba(0, 0, 0, 0.5);
        --shadow-win: 0 6px 22px rgba(0, 0, 0, 0.42);
        --shadow-active: 0 16px 48px rgba(0, 0, 0, 0.6);
        --blur: blur(10px);
        --font: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      }

      /* Refined scrollbars, consistent across every scrolling surface. */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      *::-webkit-scrollbar {
        width: 9px;
        height: 9px;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: #3a466e;
        background-clip: padding-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }
      ::selection {
        background: rgba(110, 168, 255, 0.3);
      }

      /* The map fills the whole window and sits behind everything. */
      #viewport {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: radial-gradient(120% 120% at 50% 0%, #121a2b 0%, var(--surface-2) 60%, #070a11 100%);
        image-rendering: pixelated;
        cursor: grab;
        touch-action: none;
        z-index: 0;
      }
      #viewport.dragging {
        cursor: grabbing;
      }

      /* ===================================================================
         TOP APP BAR — brand, live clock, connection state, layout reset.
         =================================================================== */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--topbar-h);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0 0.9rem;
        background: var(--glass);
        border-bottom: 1px solid var(--border);
        backdrop-filter: var(--blur);
      }
      .topbar__brand {
        display: flex;
        align-items: baseline;
        gap: 0.55rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        font-size: 0.92rem;
      }
      .topbar__logo {
        width: 0.95rem;
        height: 0.95rem;
        border-radius: 4px;
        align-self: center;
        background: linear-gradient(135deg, var(--gold), var(--accent) 70%, var(--violet));
        box-shadow: 0 0 12px rgba(110, 168, 255, 0.45);
      }
      .topbar__sub {
        color: var(--text-faint);
        font-weight: 400;
        font-size: 0.72rem;
        letter-spacing: 0.02em;
      }
      .topbar__spacer {
        flex: 1;
      }
      #clock {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.03em;
      }
      #clock[hidden] {
        display: none;
      }
      .clock__day {
        font-weight: 600;
        color: var(--ok);
        font-size: 0.78rem;
      }
      .clock__time {
        font-size: 1.05rem;
        font-weight: 600;
      }
      .clock__part {
        font-size: 0.68rem;
        color: var(--text-faint);
        text-transform: capitalize;
      }
      .topbar__status {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.72rem;
        color: var(--text-muted);
      }
      .topbar__status::before {
        content: '';
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--text-faint);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .topbar__status--on::before {
        background: var(--ok);
        box-shadow: 0 0 8px var(--ok);
      }
      .topbar__status--off::before {
        background: var(--danger);
        box-shadow: 0 0 8px var(--danger);
      }
      .topbar__btn {
        background: var(--card);
        border: 1px solid var(--border-soft);
        border-radius: 7px;
        color: var(--text-muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.72rem;
        padding: 0.28rem 0.6rem;
      }
      .topbar__btn:hover {
        color: var(--text);
        border-color: var(--border);
        background: var(--card-hover);
      }

      /* ===================================================================
         WINDOW SYSTEM — draggable / resizable / minimizable panels.
         =================================================================== */
      .desktop {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none; /* only the windows themselves catch events */
      }
      .win {
        position: fixed;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        min-width: 200px;
        min-height: 110px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-win);
        backdrop-filter: var(--blur);
        overflow: hidden;
        transition: box-shadow 0.16s ease, border-color 0.16s ease;
      }
      .win--active {
        border-color: var(--border-active);
        box-shadow: var(--shadow-active);
      }
      .win--hidden,
      .win--min {
        display: none;
      }
      .win--dragging,
      .win--resizing {
        transition: none;
        user-select: none;
      }
      .win--dragging {
        opacity: 0.96;
      }

      /* The titlebar: either a panel's own <header> adopted, or a synth bar. */
      .win__bar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-height: var(--bar-h);
        box-sizing: border-box;
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
        border-bottom: 1px solid var(--border-soft);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent);
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
      }
      .win--active .win__bar {
        background: linear-gradient(180deg, rgba(110, 168, 255, 0.1), transparent);
      }
      .win__bar:active {
        cursor: grabbing;
      }
      .win__icon {
        flex: none;
        font-size: 0.92rem;
        line-height: 1;
      }
      .win__title {
        font-weight: 600;
        letter-spacing: 0.02em;
        font-size: 0.8rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .win__controls {
        margin-left: auto;
        flex: none;
        display: flex;
        align-items: center;
        gap: 3px;
        padding-left: 0.4rem;
      }
      .win__ctl {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: var(--text-faint);
        cursor: pointer;
        font-size: 0.82rem;
        line-height: 1;
        padding: 0;
      }
      .win__ctl:hover {
        background: var(--card-hover);
        color: var(--text);
      }
      .win__ctl--close:hover {
        background: rgba(255, 107, 107, 0.18);
        color: var(--danger);
      }
      .win__body {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .win__grip {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        z-index: 3;
        background:
          linear-gradient(135deg, transparent 0 46%, var(--border) 46% 54%, transparent 54% 70%, var(--border) 70% 78%, transparent 78%);
        opacity: 0.7;
      }
      .win:hover .win__grip {
        opacity: 1;
      }

      /* ===================================================================
         DOCK — a chip per window; click to restore / focus / tuck away.
         =================================================================== */
      .dock {
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        z-index: 45;
        display: flex;
        gap: 5px;
        padding: 6px;
        max-width: calc(100vw - 24px);
        overflow-x: auto;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        backdrop-filter: var(--blur);
      }
      .dock__chip {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex: none;
        padding: 0.32rem 0.62rem;
        border: 1px solid transparent;
        border-radius: 9px;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.72rem;
        white-space: nowrap;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }
      .dock__chip:hover {
        background: var(--card);
        color: var(--text);
      }
      .dock__chip--on {
        color: var(--text);
        background: var(--card);
        border-color: var(--border-soft);
        box-shadow: inset 0 -2px 0 var(--accent);
      }
      .dock__chip--off {
        opacity: 0.5;
      }
      .dock__icon {
        font-size: 0.85rem;
      }

      /* ===================================================================
         PANEL BODIES — these classes no longer position themselves; the window
         frame owns geometry. They just fill their window and lay out content.
         =================================================================== */
      .roster,
      .inspector,
      .binspect,
      .debug,
      .convos,
      .super,
      .llm,
      .village-life {
        height: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
        color: var(--text);
      }

      /* — Inspector ("Inception") — */
      .inspector {
        font-size: 0.78rem;
      }
      .inspector__head {
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
      }
      .inspector__thoughts {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0.6rem;
      }
      .thought {
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        padding: 0.4rem 0.5rem;
        margin-bottom: 0.5rem;
        background: var(--card);
      }
      .thought--note {
        border-color: var(--violet);
        color: var(--violet);
      }
      .thought__meta {
        opacity: 0.85;
        margin-bottom: 0.3rem;
      }
      .thought__sec > summary {
        cursor: pointer;
        opacity: 0.7;
        margin: 0.15rem 0;
      }
      .thought pre {
        margin: 0.2rem 0 0.3rem;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.72rem;
        color: var(--text-muted);
      }
      .inspector__plant {
        border-top: 1px solid var(--border);
        padding: 0.6rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .inspector__input {
        width: 100%;
        box-sizing: border-box;
        resize: vertical;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.4rem;
        font-family: inherit;
        font-size: 0.75rem;
      }
      .inspector__input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .inspector__btn {
        align-self: flex-end;
        background: var(--violet);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        padding: 0.35rem 0.8rem;
        cursor: pointer;
        font-family: inherit;
      }
      .inspector__btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* — Building inspector — */
      .binspect {
        font-size: 0.78rem;
      }
      .binspect__head {
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
      }
      .binspect__resources {
        padding: 0.6rem 0.8rem;
        border-bottom: 1px solid var(--border-soft);
      }
      .binspect__meta {
        opacity: 0.7;
        margin-bottom: 0.45rem;
      }
      .binspect__nores {
        opacity: 0.5;
        font-style: italic;
      }
      .binspect__res {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.12rem 0;
      }
      .binspect__reslabel {
        flex: none;
        width: 3rem;
      }
      .binspect__bar {
        flex: 1;
        height: 0.6rem;
        background: rgba(48, 54, 61, 0.6);
        border-radius: 3px;
        overflow: hidden;
      }
      .binspect__fill {
        display: block;
        height: 100%;
        background: var(--ok);
      }
      .binspect__fill--empty {
        background: var(--danger);
      }
      .binspect__resval {
        flex: none;
        width: 3.4rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .binspect__loghead {
        padding: 0.45rem 0.8rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        border-bottom: 1px solid var(--border-soft);
      }
      .binspect__log {
        overflow-y: auto;
        padding: 0.3rem 0.6rem;
        flex: 1;
      }
      .binspect__empty {
        opacity: 0.5;
        padding: 0.4rem;
      }
      .binspect__line {
        display: flex;
        gap: 0.5rem;
        padding: 0.18rem 0.1rem;
        line-height: 1.35;
      }
      .binspect__line + .binspect__line {
        border-top: 1px solid rgba(33, 38, 45, 0.5);
      }
      .binspect__time {
        flex: none;
        color: var(--text-faint);
        font-size: 0.68rem;
        font-variant-numeric: tabular-nums;
        min-width: 5.4rem;
      }
      .binspect__evt {
        flex: 1;
        overflow-wrap: anywhere;
      }

      /* — Roster — */
      .roster {
        font-size: 0.78rem;
      }
      .roster__head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
      }
      .roster__back {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
      }
      .roster__back:hover {
        color: var(--text);
      }
      .roster__title {
        font-weight: 600;
        letter-spacing: 0.03em;
        font-size: 0.8rem;
      }
      .roster__list {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0.6rem;
      }
      .roster__empty {
        opacity: 0.5;
        padding: 0.5rem;
      }
      .roster__card {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        width: 100%;
        text-align: left;
        background: var(--card);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        padding: 0.5rem 0.6rem;
        margin-bottom: 0.4rem;
        color: var(--text);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.12s, background 0.12s, transform 0.08s;
      }
      .roster__card:hover {
        border-color: var(--accent);
        background: var(--card-hover);
      }
      .roster__card:active {
        transform: translateY(1px);
      }
      .roster__top {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .roster__swatch {
        width: 0.8rem;
        height: 0.8rem;
        border-radius: 50%;
        flex: none;
      }
      .roster__name {
        flex: 1;
        font-weight: 600;
      }
      .roster__status {
        opacity: 0.65;
        font-size: 0.7rem;
        font-style: italic;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .roster__task {
        font-size: 0.7rem;
        color: var(--teal);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .roster__needs {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .need {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .need > i {
        flex: none;
        width: 3.4rem;
        font-style: normal;
        font-size: 0.66rem;
        opacity: 0.7;
      }
      .need__bar {
        flex: 1;
        height: 0.42rem;
        border-radius: 0.21rem;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      .need__bar > u {
        display: block;
        height: 100%;
        width: 0%;
        background: var(--ok);
        transition: width 0.3s linear, background 0.3s linear;
      }
      .roster__pack {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        opacity: 0.85;
      }
      .roster__group {
        font-size: 0.7rem;
        color: var(--violet);
        border-top: 1px solid var(--border-soft);
        padding-top: 0.3rem;
        margin-top: 0.05rem;
      }
      .action {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        padding: 0.35rem 0.45rem;
        margin-bottom: 0.35rem;
        background: var(--card);
      }
      .action__main {
        flex: 1;
        min-width: 0;
        display: flex;
        gap: 0.4rem;
        align-items: baseline;
      }
      .action__tick {
        opacity: 0.5;
        flex: none;
        font-size: 0.7rem;
      }
      .action__desc {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .action__llm {
        flex: none;
        background: var(--accent-strong);
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 0.2rem 0.45rem;
        font: inherit;
        font-size: 0.68rem;
        cursor: pointer;
      }
      .action__llm:hover {
        background: var(--accent);
      }

      /* — Debug feed — */
      .debug {
        font-size: 0.72rem;
      }
      .debug__head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
        font-weight: 600;
        letter-spacing: 0.03em;
      }
      .debug__title {
        flex: 1;
      }
      .debug__avgtick {
        flex: none;
        font-weight: 400;
        font-variant-numeric: tabular-nums;
        opacity: 0.65;
      }
      .debug__pause {
        background: none;
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.7rem;
        line-height: 1;
        padding: 0.15rem 0.4rem;
      }
      .debug__pause:hover {
        color: var(--text);
      }
      .debug__pause--on {
        color: var(--gold);
        border-color: #6b5320;
      }
      .debug__tickno {
        color: var(--ok);
        font-variant-numeric: tabular-nums;
      }
      .debug__status {
        padding: 0.25rem 0.6rem;
        border-bottom: 1px solid var(--border-soft);
        border-top: 1px solid var(--border-soft);
        font-size: 0.66rem;
        opacity: 0.7;
        min-height: 1rem;
      }
      .debug__list {
        flex: 1;
        overflow-y: auto;
        padding: 0.3rem 0.4rem;
      }
      .debug__line {
        display: flex;
        gap: 0.45rem;
        align-items: baseline;
        padding: 0.12rem 0.15rem;
        border-bottom: 1px solid rgba(33, 38, 45, 0.6);
        white-space: nowrap;
      }
      .debug__tick {
        flex: none;
        opacity: 0.5;
        min-width: 2.8rem;
      }
      .debug__name {
        flex: none;
        font-weight: 600;
        min-width: 6rem;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .debug__act {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-muted);
      }
      .debug__act--skip {
        opacity: 0.4;
        font-style: italic;
      }

      /* — Conversations (tabbed) — */
      .convos {
        font-size: 0.76rem;
      }
      .convos__tabs {
        display: flex;
        gap: 0.3rem;
        padding: 0.4rem 0.45rem;
        border-bottom: 1px solid var(--border-soft);
      }
      .convos__tab {
        flex: 1;
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 0.24rem 0.4rem;
      }
      .convos__tab:hover {
        color: var(--text);
      }
      .convos__tab--on {
        color: #f0f6fc;
        border-color: var(--border-active);
        background: rgba(110, 168, 255, 0.14);
      }
      .convos__tab[data-tab="reason"].convos__tab--on {
        color: var(--gold);
        border-color: #6b5320;
        background: rgba(240, 180, 41, 0.12);
      }
      .convos__list {
        flex: 1;
        overflow-y: auto;
        padding: 0.4rem 0.5rem;
      }
      .convos__empty {
        opacity: 0.5;
        padding: 0.4rem;
      }
      .chat__line {
        padding: 0.18rem 0.1rem;
        line-height: 1.35;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }
      .chat__line + .chat__line {
        border-top: 1px solid rgba(33, 38, 45, 0.5);
      }
      .chat__time {
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
        font-size: 0.68rem;
        margin-right: 0.4rem;
      }
      .chat__who {
        font-weight: 600;
        color: var(--accent);
        margin-right: 0.4rem;
      }
      .chat__msg {
        color: var(--text);
      }
      .reason__line {
        background: rgba(240, 180, 41, 0.05);
      }
      .reason__tag {
        color: var(--gold);
        font-weight: 700;
        font-size: 0.64rem;
        letter-spacing: 0.04em;
        margin-right: 0.4rem;
      }
      .reason__who {
        font-weight: 600;
        color: #e3b341;
        margin-right: 0.4rem;
      }
      .reason__msg {
        color: #d6b36a;
        font-style: italic;
      }

      /* — Supervisor / temple console — */
      .super {
        font-size: 0.74rem;
      }
      .super__head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
      }
      .super__title {
        flex: 1;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: var(--gold);
        font-size: 0.8rem;
      }
      .super__run {
        background: rgba(240, 180, 41, 0.14);
        border: 1px solid #6b5320;
        border-radius: 6px;
        color: var(--gold);
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 0.22rem 0.5rem;
      }
      .super__run:hover {
        background: rgba(240, 180, 41, 0.28);
        color: #ffe08a;
      }
      /* — Divine Powers: weather, bless/smite, conjure — */
      .super__powers {
        flex: none;
        padding: 0.5rem 0.6rem 0.55rem;
        border-bottom: 1px solid var(--border-soft);
        border-top: 1px solid var(--border-soft);
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .super__plabel {
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-faint);
        margin-top: 0.15rem;
      }
      .super__weather {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.3rem;
      }
      .super__wbtn {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--card);
        color: var(--text-muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.66rem;
        padding: 0.28rem 0.2rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .super__wbtn:hover {
        color: var(--text);
        border-color: var(--border-active);
      }
      .super__wbtn--on {
        color: #cfe3ff;
        border-color: var(--accent);
        background: rgba(110, 168, 255, 0.18);
      }
      .super__godrow {
        display: flex;
        gap: 0.3rem;
        align-items: center;
      }
      .super__target {
        flex: 1;
        min-width: 0;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
        font-size: 0.7rem;
        padding: 0.24rem 0.3rem;
      }
      .super__gbtn {
        flex: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 0.26rem 0.5rem;
      }
      .super__godrow .super__gbtn {
        flex: 1;
      }
      .super__bless:hover {
        border-color: var(--ok);
        color: #7ee2c8;
        background: rgba(70, 211, 154, 0.14);
      }
      .super__smite:hover {
        border-color: var(--danger);
        color: #ff9b94;
        background: rgba(255, 107, 107, 0.14);
      }
      .super__spawnv:hover,
      .super__spawnt:hover {
        border-color: var(--accent);
        color: #cfe3ff;
        background: rgba(110, 168, 255, 0.14);
      }
      .super__sub {
        padding: 0.3rem 0.6rem;
        border-bottom: 1px solid var(--border-soft);
        border-top: 1px solid var(--border-soft);
        font-size: 0.66rem;
        opacity: 0.75;
      }
      .super__count {
        color: var(--gold);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .super__list {
        flex: 1;
        overflow-y: auto;
        padding: 0.35rem 0.45rem;
        min-height: 3rem;
      }
      .super__empty {
        opacity: 0.45;
        font-style: italic;
        padding: 0.4rem;
      }
      .super__prayer {
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        padding: 0.4rem 0.5rem;
        margin-bottom: 0.4rem;
        background: var(--card);
      }
      .super__prayer--ok {
        border-color: var(--ok);
        background: rgba(46, 160, 67, 0.08);
      }
      .super__prayer--no {
        border-color: var(--text-faint);
        opacity: 0.6;
      }
      .super__praytop {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .super__who {
        font-weight: 600;
        color: var(--violet);
      }
      .super__tick {
        flex: none;
        opacity: 0.5;
        font-size: 0.66rem;
        font-variant-numeric: tabular-nums;
      }
      .super__msg {
        color: var(--text);
        margin: 0.25rem 0 0.4rem;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }
      .super__btns {
        display: flex;
        gap: 0.4rem;
      }
      .super__btn {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: none;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 0.22rem 0.4rem;
      }
      .super__accept:hover {
        border-color: var(--ok);
        color: #56d364;
        background: rgba(46, 160, 67, 0.12);
      }
      .super__reject:hover {
        border-color: var(--danger);
        color: #ff7b72;
        background: rgba(248, 81, 73, 0.12);
      }
      .super__verdict {
        display: block;
        font-size: 0.68rem;
        font-style: italic;
        opacity: 0.8;
      }
      .super__actshead {
        padding: 0.35rem 0.6rem;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border-soft);
        font-weight: 600;
        letter-spacing: 0.03em;
        font-size: 0.68rem;
        opacity: 0.85;
      }
      .super__acts {
        flex: none;
        max-height: 32%;
        overflow-y: auto;
        padding: 0.3rem 0.45rem;
      }
      .super__act {
        display: flex;
        gap: 0.45rem;
        align-items: baseline;
        padding: 0.18rem 0.1rem;
        border-bottom: 1px solid rgba(33, 38, 45, 0.5);
      }
      .super__actkind {
        flex: none;
        color: var(--gold);
        font-weight: 600;
        font-size: 0.66rem;
      }
      .super__actsum {
        flex: 1;
        color: var(--text-muted);
        overflow-wrap: anywhere;
      }

      /* — LLM engine — */
      .llm {
        font-size: 0.72rem;
      }
      .llm__head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.5rem 0.35rem 0.7rem;
      }
      .llm__title {
        flex: none;
        font-weight: 600;
        letter-spacing: 0.03em;
        font-size: 0.8rem;
      }
      .llm__tally {
        flex: 1;
        font-size: 0.66rem;
        opacity: 0.85;
        text-align: right;
      }
      .llm__live--on {
        color: #4dafff;
      }
      .llm__ok {
        color: var(--ok);
      }
      .llm__err {
        color: var(--danger);
      }
      .llm__pause {
        background: none;
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.7rem;
        line-height: 1;
        padding: 0.15rem 0.4rem;
      }
      .llm__pause:hover {
        color: var(--text);
      }
      .llm__pause--on {
        color: var(--gold);
        border-color: #6b5320;
      }
      .llm__filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        padding: 0.3rem 0.5rem;
        border-bottom: 1px solid var(--border-soft);
      }
      .llm__chip {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        background: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text-muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.64rem;
        line-height: 1;
        padding: 0.22rem 0.5rem;
        opacity: 0.5;
        transition: opacity 0.15s ease, border-color 0.15s ease;
      }
      .llm__chip:hover {
        opacity: 0.8;
      }
      .llm__chip--on {
        opacity: 1;
        color: var(--text);
        border-color: var(--chip-color, var(--border-active));
      }
      .llm__chip-dot {
        flex: none;
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 50%;
        background: var(--chip-color, var(--text-muted));
      }
      .llm__chip-count {
        font-variant-numeric: tabular-nums;
        opacity: 0.8;
      }
      .llm__chip-avg {
        font-variant-numeric: tabular-nums;
        opacity: 0.55;
      }
      .llm__avg {
        opacity: 0.85;
      }
      .llm__label--decide {
        color: var(--accent);
      }
      .llm__label--supervisor {
        color: var(--violet);
      }
      .llm__label--reflect {
        color: var(--teal);
      }
      .llm__label--plan {
        color: var(--gold);
      }
      .llm__label--embed {
        color: var(--text-muted);
      }
      .llm__running {
        flex: none;
        border-bottom: 1px solid var(--border-soft);
        border-top: 1px solid var(--border-soft);
        padding: 0.3rem 0.4rem;
        max-height: 34%;
        overflow-y: auto;
      }
      .llm__idle {
        opacity: 0.4;
        font-style: italic;
        padding: 0.15rem 0.2rem;
      }
      .llm__row {
        display: flex;
        align-items: baseline;
        gap: 0.4rem;
        padding: 0.15rem 0.2rem;
        white-space: nowrap;
      }
      .llm__spin {
        color: #4dafff;
        animation: llm-pulse 1s ease-in-out infinite;
      }
      @keyframes llm-pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .llm__row--slow .llm__elapsed {
        color: var(--gold);
      }
      .llm__row--vslow .llm__elapsed {
        color: var(--danger);
        font-weight: 600;
      }
      .llm__agent {
        flex: none;
        max-width: 7rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--accent);
        font-weight: 600;
      }
      .llm__label {
        flex: none;
        min-width: 3.4rem;
        opacity: 0.85;
      }
      .llm__elapsed {
        flex: none;
        font-variant-numeric: tabular-nums;
        opacity: 0.85;
        min-width: 3.2rem;
      }
      .llm__preview {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0.6;
      }
      .llm__recent {
        flex: 1;
        overflow-y: auto;
        padding: 0.3rem 0.4rem;
      }
      .llm__empty {
        opacity: 0.4;
        padding: 0.2rem;
      }
      .llm__item {
        border-bottom: 1px solid rgba(33, 38, 45, 0.7);
        padding: 0.12rem 0;
      }
      .llm__item > summary {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        cursor: pointer;
        list-style: none;
      }
      .llm__item > summary::-webkit-details-marker {
        display: none;
      }
      .llm__dot {
        flex: none;
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        background: var(--ok);
      }
      .llm__dot--err {
        background: var(--danger);
      }
      .llm__dur {
        margin-left: auto;
        flex: none;
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
      }
      .llm__dur--slow {
        color: var(--gold);
        opacity: 1;
      }
      .llm__dur--vslow {
        color: var(--danger);
        opacity: 1;
        font-weight: 600;
      }
      .llm__sub {
        margin: 0.2rem 0 0.1rem 1rem;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text-muted);
        font-size: 0.7rem;
      }
      .llm__sub--req {
        opacity: 0.65;
      }
      .llm__sub--err {
        color: #ff9b94;
      }
      .llm__sub > b {
        opacity: 0.5;
        margin-right: 0.2rem;
      }

      /* ===================================================================
         VILLAGE LIFE — a scrolling stack of collapsible cards in one window.
         =================================================================== */
      .village-life {
        gap: 10px;
        overflow-y: auto;
        padding: 10px;
      }
      .vlife {
        flex: none;
        display: flex;
        flex-direction: column;
        background: var(--card);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .vlife__head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.6rem;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid var(--border-soft);
      }
      .vlife--collapsed .vlife__head {
        border-bottom: none;
      }
      .vlife__caret {
        color: var(--text-faint);
        transition: transform 0.15s ease;
        font-size: 0.7rem;
      }
      .vlife--collapsed .vlife__caret {
        transform: rotate(-90deg);
      }
      .vlife__icon {
        font-size: 0.9rem;
      }
      .vlife__title {
        flex: 1;
        font-weight: 600;
        letter-spacing: 0.03em;
        font-size: 0.78rem;
      }
      .vlife__count {
        font-size: 0.68rem;
        color: var(--text-faint);
        background: var(--glass-strong);
        border-radius: 999px;
        padding: 0.05rem 0.5rem;
        font-variant-numeric: tabular-nums;
      }
      .vlife__body {
        overflow-y: auto;
        max-height: 38vh;
        padding: 0.45rem 0.55rem;
        font-size: 0.78rem;
      }
      .vlife--collapsed .vlife__body {
        display: none;
      }
      .vlife__empty {
        opacity: 0.5;
        font-style: italic;
        padding: 0.4rem 0.3rem;
      }

      /* — Relationships — */
      .rel__person {
        margin-bottom: 0.6rem;
      }
      .rel__person:last-child {
        margin-bottom: 0;
      }
      .rel__who {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        margin-bottom: 0.3rem;
      }
      .rel__swatch {
        width: 0.7rem;
        height: 0.7rem;
        border-radius: 50%;
        flex: none;
      }
      .rel__name {
        font-weight: 600;
      }
      .rel__tie {
        display: grid;
        grid-template-columns: 6.6rem 1fr;
        gap: 0.4rem 0.55rem;
        align-items: center;
        padding: 0.28rem 0.1rem 0.28rem 1.15rem;
      }
      .rel__tie + .rel__tie {
        border-top: 1px solid rgba(40, 49, 73, 0.4);
      }
      .rel__other {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .rel__opinion {
        grid-column: 1 / -1;
        padding-left: 1.05rem;
        color: var(--text-muted);
        font-style: italic;
        line-height: 1.35;
      }
      .rel__meter {
        position: relative;
        height: 0.5rem;
        border-radius: 0.25rem;
        background: rgba(255, 255, 255, 0.07);
        overflow: hidden;
      }
      .rel__fill {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 0;
      }
      .rel__score {
        grid-column: 1 / -1;
        display: none;
      }

      /* — Shared plans (agenda) — */
      .plan {
        background: var(--glass-strong);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        padding: 0.45rem 0.55rem;
        margin-bottom: 0.45rem;
      }
      .plan:last-child {
        margin-bottom: 0;
      }
      .plan__top {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-bottom: 0.3rem;
      }
      .plan__badge {
        flex: none;
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-radius: 999px;
        padding: 0.05rem 0.45rem;
        border: 1px solid currentColor;
      }
      .plan__badge--work {
        color: var(--teal);
      }
      .plan__badge--prayer {
        color: var(--gold);
      }
      .plan__badge--social {
        color: var(--accent);
      }
      .plan__badge--build {
        color: #d8a657;
      }
      .plan__goal {
        flex: 1;
        font-weight: 600;
        line-height: 1.3;
      }
      .plan__role {
        display: flex;
        gap: 0.4rem;
        padding: 0.12rem 0;
        color: var(--text-muted);
      }
      .plan__rolename {
        flex: none;
        min-width: 4.6rem;
        color: var(--text);
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* — Prayers — */
      .prayer {
        display: flex;
        gap: 0.5rem;
        padding: 0.32rem 0.1rem;
        line-height: 1.35;
        border-left: 2px solid var(--gold);
        padding-left: 0.55rem;
        margin-bottom: 0.4rem;
      }
      .prayer__who {
        flex: none;
        font-weight: 600;
        color: var(--gold);
      }
      .prayer__msg {
        flex: 1;
        overflow-wrap: anywhere;
      }

      /* ===================================================================
         MODAL — transient detail dialog (LLM data, transcripts).
         =================================================================== */
      .modal-root {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(3, 6, 12, 0.72);
        backdrop-filter: blur(3px);
        padding: 2rem;
      }
      .modal-root[hidden] {
        display: none;
      }
      .modal {
        width: 720px;
        max-width: 100%;
        max-height: 100%;
        display: flex;
        flex-direction: column;
        background: var(--glass-strong);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .modal__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.6rem 0.9rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
      }
      .modal__close {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.95rem;
      }
      .modal__close:hover {
        color: var(--text);
      }
      .modal__body {
        overflow-y: auto;
        padding: 0.6rem 0.9rem;
      }
      .modal__body details {
        margin-bottom: 0.5rem;
      }
      .modal__body summary {
        cursor: pointer;
        opacity: 0.75;
        margin-bottom: 0.25rem;
      }
      .modal__body pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.72rem;
        color: var(--text-muted);
        background: var(--surface-2);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-sm);
        padding: 0.5rem;
      }
      .transcript .line {
        display: flex;
        gap: 0.5rem;
        padding: 0.35rem 0;
        border-bottom: 1px solid var(--border-soft);
      }
      .transcript .line:last-child {
        border-bottom: none;
      }
      .line__who {
        flex: none;
        min-width: 5.5rem;
        font-weight: 600;
        color: var(--accent);
      }
      .line__msg {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>

    <header class="topbar">
      <span class="topbar__brand">
        <span class="topbar__logo"></span>
        simVillage
        <span class="topbar__sub">a living village · click a villager to read its mind · scroll to zoom · drag to pan</span>
      </span>
      <span class="topbar__spacer"></span>
      <div id="clock" hidden></div>
      <button id="reset-layout" class="topbar__btn" title="Reset all windows to their default positions">⟲ Reset layout</button>
      <span id="status" class="topbar__status topbar__status--off">connecting…</span>
    </header>

    <!-- The desktop (windows) and dock are created by WindowManager at runtime. -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
