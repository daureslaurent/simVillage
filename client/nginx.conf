# Serves the built Canvas viewport AND is the village's single front door: the
# backend is not exposed to the host, so this nginx reverse-proxies the browser's
# WebSocket and REST calls through to the backend gateway over the `edge` network.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The gateway's REST endpoints (action history, personas, memories, etc.).
    # Keep in sync with IngressGateway's routes.
    location ~ ^/(villagers|conversations|relationships|group-plans|agenda|daily-reports|buildings)(/|$) {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # "/" is shared: a WebSocket upgrade is detoured to @ws and proxied to the
    # gateway; every other request serves the single-page app.
    location / {
        error_page 418 = @ws;
        recursive_error_pages on;
        if ($http_upgrade) { return 418; }
        try_files $uri $uri/ /index.html;
    }

    location @ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Villager WS sessions are long-lived; don't time them out mid-village.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
