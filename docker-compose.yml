# ---------------------------------------------------------------------------
# simVillage — brought up with `docker compose up --build`:
#
#   mongo   -> persistent datastore (world seed + live snapshots)
#   qdrant  -> vector store for villager long-term memory (RAG)
#   embed   -> local embedding server (llama.cpp, CUDA) for memory vectors
#   llm     -> the ONE LLM engine; the only thing that talks to your llama server
#   backend -> the whole village in one process: world engine + minds + the God
#              Agent + the browser-facing WebSocket gateway. Persists to mongo,
#              reaches the llm engine over HTTP.
#   client  -> the Canvas viewport, built to static files and served by nginx
#
# Data flow:
#   browser <--WS/HTTP--> client(nginx) --proxy--> backend <--HTTP--> llm <--> llama
#                                                      |
#                                                      +--> mongo + qdrant
#
# Network exposure:
#   Only the `client` service publishes a host port (5173). Everything else lives
#   on internal Docker networks the host cannot reach inbound:
#     core -> mongo, qdrant, embed, llm, backend  (the engine room)
#     edge -> backend, client                     (the only path to the browser)
#   The browser hits the client's own origin; nginx reverse-proxies the WebSocket
#   and REST calls to the backend across `edge`. So the village is reachable from
#   the host at exactly one place — http://localhost:5173 — and nowhere else.
#
# The node services BUILD their source into self-contained images (esbuild
# bundle for backend/llm, `vite build` for the client) — nothing is bind-mounted
# from the host. For a hot-reloading dev workflow that mounts the source, add
# the dev overlay:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ---------------------------------------------------------------------------
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    networks: [core]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vector database for villager long-term memory (RAG). Used only when
  # VILLAGER_MEMORY=on on the backend. Rest API on :6333; gRPC on :6334.
  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    # Qdrant's RocksDB keeps many segment files open; the host's default file-descriptor
    # limit is easily exhausted ("Too many open files"), which corrupts writes and
    # crashes the backend on its next boot. Raise the limit so it stays healthy.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks: [core]
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local embedding server (llama.cpp, CPU). Serves OpenAI-compatible
  # /v1/embeddings on :8080 for villager long-term memory. Your chat llama
  # server is a separate, chat-only box, so embeddings get their own server
  # here. The GGUF is auto-downloaded from HuggingFace on first boot (-hf) and
  # cached in the `embed-models` volume, so later starts are instant.
  #
  # CPU build — runs anywhere, no GPU needed (e.g. an OVH VPS). nomic-embed is
  # tiny and memory strings are short, so CPU is fine. To use an NVIDIA GPU
  # instead, switch the image to `:server-cuda`, add `-ngl 99` to the command,
  # and add a `deploy.resources.reservations.devices` nvidia block.
  embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    # nomic-embed-text-v1.5 -> 768-dim vectors (matches EMBED_DIM=768). --alias
    # pins the model name the server answers to, so EMBED_MODEL must match it.
    command: >
      -hf nomic-ai/nomic-embed-text-v1.5-GGUF:Q8_0
      --alias nomic-embed-text
      --embeddings
      --pooling mean
      --host 0.0.0.0
      --port 8080
    environment:
      # Where -hf caches the downloaded GGUF (persisted by the volume below).
      LLAMA_CACHE: /models
    networks: [core]
    volumes:
      - embed-models:/models
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      # First boot downloads the model; give it room before marking unhealthy.
      start_period: 300s

  # The single LLM engine: the ONE service that talks to the lone llama server.
  # The backend POSTs all its LLM work here, and the engine serializes it so the
  # server is never hit concurrently. Run exactly one.
  llm:
    build:
      context: .
      dockerfile: llm/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      LLM_PORT: ${LLM_PORT:-8090}
      # The one OpenAI-compatible llama server (comma-separated to pool several
      # for failover; a single URL is the norm). host.docker.internal reaches a
      # server on the host.
      LLAMA_URLS: ${LLAMA_URLS:-http://host.docker.internal:8080}
      LLAMA_MODEL: ${LLAMA_MODEL:-llama}
      LLAMA_API_KEY: ${LLAMA_API_KEY:-}
      LLAMA_TIMEOUT_MS: ${LLAMA_TIMEOUT_MS:-30000}
      # Embedding model for memory. Defaults to the local `embed` service above;
      # EMBED_MODEL must match that server's --alias.
      EMBED_URLS: ${EMBED_URLS:-http://embed:8080}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EMBED_DIM: ${EMBED_DIM:-768}
      # Optional floor on the gap between successive llama calls, in ms (0 = none).
      LLM_ENGINE_MIN_GAP_MS: ${LLM_ENGINE_MIN_GAP_MS:-0}
      # Global cap on completion length (tokens) for EVERY llama call — both villager
      # decisions and reflection/planning prose. Unset = no cap on decisions and the
      # 1024 default on prose. Raise it for a THINKING model that reasons before it
      # answers (too tight and it never reaches its output). LLAMA_SYNTH_MAX_TOKENS
      # still overrides this for prose only; world generation overrides per-call.
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-16000}
      LLAMA_SYNTH_MAX_TOKENS: ${LLAMA_SYNTH_MAX_TOKENS:-16000}
    depends_on:
      embed:
        condition: service_healthy
    networks: [core]
    # The llm engine reaches the host's llama server via host.docker.internal.
    # That name is automatic on Docker Desktop; pin it explicitly so a plain
    # Linux Docker (where it isn't) still resolves to the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      # The minds have no brain without the LLM engine.
      llm:
        condition: service_started
      # Vector store for long-term memory (needed only when VILLAGER_MEMORY=on).
      qdrant:
        condition: service_started
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/simvillage}
      # Where to reach the shared LLM engine.
      LLM_URL: ${LLM_URL:-http://llm:8090}
      LLM_CLIENT_TIMEOUT_MS: ${LLM_CLIENT_TIMEOUT_MS:-120000}
      EMBED_DIM: ${EMBED_DIM:-768}
      # The browser connects to this WebSocket port (mapped to the host below).
      GATEWAY_WS_PORT: ${GATEWAY_WS_PORT:-8080}
      SNAPSHOT_EVERY_TICKS: ${SNAPSHOT_EVERY_TICKS:-50}
      # Slowed world clock so villagers stay near each other between thoughts.
      WORLD_TICK_RATE: ${WORLD_TICK_RATE:-3}
      # WORLD CREATION. When there is NO world yet, the FRONTEND shows a first-run
      # setup screen: pick auto-generate (LLM) with a STYLE (desert, alien, water…),
      # a villager count and a size — or the classic hand-crafted village. The result
      # is persisted, so later boots just resume it; a "New Village" button in Settings
      # wipes it and returns to setup.
      #   GENERATE_LLM  — whether the auto-generate option is offered at all (default on).
      #   GENERATE_AUTO — skip the setup screen and auto-generate HEADLESSLY with the
      #                   env style/count (for dev/CI with no browser). Default off.
      #   GENERATE_THEME — prefills the style field (and is the headless style).
      #   MAX_GENERATE_VILLAGERS — the villager-count ceiling (slider max).
      GENERATE_LLM: ${GENERATE_LLM:-on}
      GENERATE_AUTO: ${GENERATE_AUTO:-}
      GENERATE_THEME: ${GENERATE_THEME:-}
      MAX_GENERATE_VILLAGERS: ${MAX_GENERATE_VILLAGERS:-6}
      # The roster of bodies to give minds to: VILLAGER_IDS (comma-separated)
      # wins; otherwise villager_1..VILLAGER_COUNT. Keep VILLAGER_COUNT equal to
      # the seed's villager count so every body has a mind. (Ignored when
      # GENERATE_LLM=on: the generated roster decides who exists.)
      VILLAGER_IDS: ${VILLAGER_IDS:-}
      VILLAGER_COUNT: ${VILLAGER_COUNT:-5}
      # Optional per-villager personas, JSON keyed by id, e.g.
      # {"villager_1":{"name":"Bram","goal":"bake bread"}}.
      VILLAGER_PROFILES: ${VILLAGER_PROFILES:-}
      VILLAGER_SENSE_RADIUS: ${VILLAGER_SENSE_RADIUS:-15}
      # Calmer cadence: one shared server thinks for every mind, and slower
      # thinking gives villagers time to react to one another.
      VILLAGER_THINK_INTERVAL_MS: ${VILLAGER_THINK_INTERVAL_MS:-12000}
      # Turn on long-term memory (needs Qdrant at QDRANT_URL + an embed model).
      VILLAGER_MEMORY: ${VILLAGER_MEMORY:-on}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      # The God Agent's standing directive + how often it may intervene.
      SUPERVISOR_CHARTER: ${SUPERVISOR_CHARTER:-}
      SUPERVISOR_MIN_DAYS_BETWEEN_ACTS: ${SUPERVISOR_MIN_DAYS_BETWEEN_ACTS:-1}
      VILLAGER_TICKS_PER_DAY: ${VILLAGER_TICKS_PER_DAY:-1000}
      MIN_ROUND_MS: ${MIN_ROUND_MS:-3000}
    # No host port: the browser never reaches the gateway directly. `core` talks
    # to mongo/qdrant/llm; `edge` is the lone link the client's nginx proxies over.
    networks: [core, edge]

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: runtime
      args:
        # Baked into the browser bundle at build time. Empty by default: the
        # bundle then connects to its OWN origin (the page's host:port), which
        # nginx reverse-proxies to the backend. Set this only to point the
        # browser at some other gateway directly.
        VITE_WS_URL: ${VITE_WS_URL:-}
        # Version stamp shown in the topbar. Computed on the host (where .git
        # lives) and injected here; `npm run up` sets it. Empty -> vite falls
        # back to package.json's version with a '.0' commit count.
        APP_VERSION: ${APP_VERSION:-}
    restart: unless-stopped
    depends_on:
      - backend
    # The ONLY service exposed to the host. nginx serves the static bundle and
    # proxies the WS + REST through to the backend over `edge`.
    networks: [edge]
    # Host 5173 (the familiar dev URL) -> nginx :80 inside the container.
    ports:
      - "5173:80"

networks:
  # The engine room — backend talks to mongo/qdrant/llm here. No host exposure.
  core:
  # The single hop between the client's nginx and the backend gateway.
  edge:

volumes:
  mongo-data:
  qdrant-data:
  embed-models:
